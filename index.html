<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── CSS VARIABLES — light (default) ── */
:root{
  --bg:        #F5F8FC;
  --surface:   #FFFFFF;
  --navy:      #0A1628;
  --ink:       #2D3748;
  --mid:       #4A5568;
  --soft:      #718096;
  --gold:      #F0A500;
  --blue:      #1A6FB4;
  --blue-lt:   #EEF6FF;
  --blue-txt:  #1A6FB4;
  --green:     #10B981;
  --red:       #EF4444;
  --warn-bg:   #FFFBEA;
  --warn-txt:  #7B5800;
  --err-bg:    #FEE2E2;
  --err-txt:   #991B1B;
  --border:    #E8EEF5;
  --input-bg:  #FFFFFF;
  --chip-bg:   #FFFFFF;
  --chip-on:   #0A1628;
  --chip-on-c: #FFFFFF;
  --apt-bg:    #FFFFFF;
  --apt-hover: #EEF6FF;
  --footer-bg: #FFFFFF;
  --shadow:    rgba(10,22,40,.07);
  --shadow2:   rgba(10,22,40,.15);
}

/* ── CSS VARIABLES — dark ── */
.dark-mode{
  --bg:        #0D1B2A;
  --surface:   #1A2940;
  --navy:      #E2E8F0;
  --ink:       #CBD5E0;
  --mid:       #A0AEC0;
  --soft:      #718096;
  --gold:      #F0A500;
  --blue:      #4299E1;
  --blue-lt:   #1A2940;
  --blue-txt:  #63B3ED;
  --green:     #38A169;
  --red:       #FC8181;
  --warn-bg:   #2D2000;
  --warn-txt:  #F6C000;
  --err-bg:    #2D1212;
  --err-txt:   #FC8181;
  --border:    #2D3F55;
  --input-bg:  #0D1B2A;
  --chip-bg:   #1A2940;
  --chip-on:   #4299E1;
  --chip-on-c: #FFFFFF;
  --apt-bg:    #1A2940;
  --apt-hover: #1E2D3D;
  --footer-bg: #0D1B2A;
  --shadow:    rgba(0,0,0,.3);
  --shadow2:   rgba(0,0,0,.5);
}

/* ── BASE ── */
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--navy)}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 30px var(--shadow)}

/* ── HEADER — sempre dark, non cambia con dark mode ── */
.hdr{background:linear-gradient(135deg,#0A1628,#1A6FB4);color:white;padding:14px 16px;display:flex;align-items:center;gap:10px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo-text{font-family:'Lora',serif;font-size:18px;font-weight:700;color:white}
.hdr-logo-text .gold{color:#F0A500}
.hdr-mark{flex-shrink:0;display:block}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px;color:white}
.hdr-badge{background:rgba(255,255,255,.15);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:auto;color:white}
.hdr-darkmode{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:4px 6px;margin-left:6px;border-radius:6px;transition:background .2s}
.hdr-darkmode:hover{background:rgba(255,255,255,.15)}

/* ── TABS — sempre dark ── */
.tabs{display:flex;background:#0A1628;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:100}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:10px 13px;border:none;background:none;color:rgba(255,255,255,.6);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit}
.tab-btn.active{color:white;border-bottom-color:#F0A500}

/* ── LAYOUT ── */
.content{flex:1;padding:14px}
.card{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px var(--shadow)}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--navy)}
.card-sub{font-size:13px;color:var(--mid);margin-bottom:14px}

/* ── FORM FIELDS ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mid);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:var(--input-bg);color:var(--navy)}
.field input:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,180,.1)}
.field input::placeholder{color:var(--soft)}
.field select option{background:var(--surface);color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary:active{opacity:.85}

/* ── CHIPS ── */
.btn-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip{border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;background:var(--chip-bg);color:var(--mid);font-family:inherit}
.chip.on{background:var(--chip-on);color:var(--chip-on-c);border-color:var(--chip-on)}

/* ── RESULT BOX ── */
.result{background:var(--bg);border-radius:10px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-wrap:break-word;color:var(--ink);border:1px solid var(--border);margin-top:4px}

/* ── EMPTY STATE ── */
.empty{padding:24px;text-align:center;color:var(--soft);font-size:13px}

/* ── BOX INFORMATIVI ── */
.box-warn{background:var(--warn-bg);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--warn-txt);margin-top:10px;line-height:1.5}
.box-info{background:var(--blue-lt);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--blue-txt);margin-bottom:10px;line-height:1.5}
.box-err{background:var(--err-bg);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--err-txt);margin-bottom:10px;line-height:1.5}

/* ── AIRPORT DROPDOWN ── */
.apt-wrap{position:relative}
.apt-drop{position:absolute;top:100%;left:0;right:0;background:var(--apt-bg);border:1.5px solid var(--blue);border-radius:10px;box-shadow:0 4px 20px var(--shadow2);z-index:999;max-height:220px;overflow-y:auto;margin-top:2px;display:none}
.apt-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--navy);background:var(--apt-bg)}
.apt-item:hover,.apt-item:active{background:var(--apt-hover)}
.apt-code{font-weight:700;color:var(--blue-txt);margin-right:6px}

function haversine(c1,c2){
  if(!c1||!c2)return null;
  const R=6371,d2r=Math.PI/180;
  const dLat=(c2[0]-c1[0])*d2r,dLon=(c2[1]-c1[1])*d2r;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*d2r)*Math.cos(c2[0]*d2r)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

  if(d<1500)return{comp:250,half:125,dist:d,label:d+"km"};
  if(d<3500)return{comp:400,half:200,dist:d,label:d+"km"};
  return{comp:600,half:300,dist:d,label:d+"km"};
}

function deadlineInfo(flightDate){
  if(!flightDate)return null;
  const fd=new Date(flightDate);
  const now=new Date();
  const days=Math.round((now-fd)/(1000*60*60*24));
  const deadline2y=new Date(fd); deadline2y.setFullYear(deadline2y.getFullYear()+2);
  const daysLeft=Math.round((deadline2y-now)/(1000*60*60*24));
  if(daysLeft<0)return "ATTENZIONE: I 2 anni per il reclamo sono SCADUTI il "+deadline2y.toLocaleDateString("it-IT")+". Verifica con un legale se ci sono eccezioni.";
  if(daysLeft<30)return "URGENTE: scadenza reclamo tra "+daysLeft+" giorni ("+deadline2y.toLocaleDateString("it-IT")+")!";
  if(daysLeft<90)return "Scadenza reclamo: "+deadline2y.toLocaleDateString("it-IT")+" ("+daysLeft+" giorni). Agisci presto.";
  return "Hai tempo fino al "+deadline2y.toLocaleDateString("it-IT")+" ("+daysLeft+" giorni) per presentare reclamo.";
}

  const euC=["ITA","Ryanair","easyJet","Vueling","Wizz","Iberia","Air France","Lufthansa","KLM","British","TAP","Austrian","LOT","Finnair","Alitalia","Volotea","Norwegian","Transavia","Aegean","SAS","Swiss","Brussels"];

  const ok=fromEU||isEUC;
  const {comp,half,dist,label}=getComp(fCode||"FCO",tCode||"LHR");

  let extra="";
  if(deadline)extra+="\n\nSCADENZA RECLAMO: "+deadline;
  if(airGuide)extra+="\n\n"+airGuide;
  extra+=refund;
  extra+=flrNote;

  if(iss.includes("cancellat")){
    return "BASE LEGALE: Reg. CE 261/2004 Art. 5\n\nDISTANZA ROTTA: "+label+"\nCOMPENSAZIONE: EUR "+comp+"/passeggero\n\nQUANDO HAI DIRITTO ALLA COMPENSAZIONE:\n✅ Cancellazione comunicata MENO di 14 giorni prima della partenza\n✅ Cancellazione senza offerta di volo alternativo con orari simili\n\nQUANDO NON HAI DIRITTO ALLA COMPENSAZIONE:\n❌ Cancellazione comunicata 14+ giorni prima (solo rimborso biglietto)\n❌ Comunicata 7-13 giorni prima con alternativa che parte max 2h prima e arriva max 4h dopo\n❌ Comunicata 2-6 giorni prima con alternativa che parte max 1h prima e arriva max 2h dopo\n\nCIRCOSTANZE STRAORDINARIE (esonero compensazione, ma non dal rimborso):\n⚠️ Maltempo estremo certificato | Scioperi ATC (non della compagnia) | Instabilità politica improvvisa | Emergenze sicurezza imprevedibili\n✅ NON sono straordinarie: scioperi della compagnia, problemi tecnici evitabili, mancanza equipaggio, overbooking\n\nHAI SEMPRE DIRITTO A:\n- Scelta tra: rimborso biglietto entro 7gg OPPURE volo alternativo\n- Assistenza durante attesa (pasti proporzionali)\n- Hotel + transfer se pernottamento necessario\n- 2 telefonate/email gratuite\n\nCOSA FARE SUBITO:\n1️⃣ Chiedi conferma scritta della cancellazione con motivazione\n2️⃣ Scegli tra rimborso o alternativa IN AEROPORTO\n3️⃣ Conserva tutti i documenti\n4️⃣ Invia reclamo formale entro 2 anni\n\nTESTO RECLAMO:\n---\nOgg: Reclamo cancellazione volo - Reg CE 261/2004 - Art. 5\nSpett.le "+v+",\nil/la sottoscritto/a [NOME COGNOME], codice prenotazione [PNR], aveva prenotato il volo [NUMERO VOLO] del "+d+", rotta "+rotta+".\nIl volo è stato cancellato [senza preavviso adeguato / con meno di 14 giorni di preavviso].\nAi sensi dell'Art. 5 del Reg. CE 261/2004, richiedo:\n- Compensazione pecuniaria: EUR "+comp+" per passeggero\n- Rimborso integrale biglietto: EUR [IMPORTO] entro 7 giorni\nIn assenza di riscontro entro 30 giorni, presenterò reclamo all'ENAC e valuterò azione legale.\n[NOME] — [EMAIL] — [TEL]\n---\n\nESCALATION: 1) ENAC (enac.gov.it/consumatori) → 2) ADR (arbitrato) → 3) Giudice di Pace"+extra;
  }

  // ── RITARDO ──
  if(iss.includes("ritardo")){
    return "BASE LEGALE: Reg. CE 261/2004 Art. 6+7 + Sentenza CJUE C-402/07 (Sturgeon, 2009)\n\nDISTANZA ROTTA: "+label+"\nCOMPENSAZIONE: EUR "+comp+" (ridotta a EUR "+half+" se riprotezione con arrivo nella soglia)\n\nCOME SI CALCOLA IL RITARDO:\n📍 Si conta all'ARRIVO a destinazione (apertura porte), NON alla partenza\n📍 Screenshot dell'app o comunicazione ufficiale: fondamentali come prova\n\nSOGLIE DI COMPENSAZIONE:\n- Ritardo >= 3h all'arrivo → EUR "+comp+" (o "+half+" se riprotezione)\n- Ritardo >= 5h → puoi rinunciare al volo + rimborso integrale biglietto\n\nASSISTENZA OBBLIGATORIA DURANTE ATTESA:\n- >= 2h attesa: pasti e bevande proporzionali\n- >= 5h: diritto di rinuncia + rimborso\n- Pernottamento + hotel + transfer se volo spostato al giorno dopo\n- 2 telefonate/email/fax gratuiti\n\nCIRCOSTANZE STRAORDINARIE (nessuna compensazione):\n⚠️ Maltempo estremo | Scioperi ATC | Instabilità politica\n✅ NON straordinari: problemi tecnici evitabili, overbooking, scioperi della compagnia\n\nTESTO RECLAMO:\n---\nOgg: Reclamo ritardo volo - Reg CE 261/2004 - Art. 7\nSpett.le "+v+",\nil/la sottoscritto/a [NOME], prenotazione [PNR], era a bordo del volo [N.] del "+d+", rotta "+rotta+".\nIl volo è arrivato a destinazione con [ORE] di ritardo (orario arrivo stimato [ORA] / effettivo [ORA]).\nAi sensi dell'Art. 7 Reg. CE 261/2004 e sent. CJUE C-402/07, richiedo compensazione di EUR "+comp+".\nIn assenza di riscontro entro 30gg, presenterò reclamo ENAC.\n[NOME] — [EMAIL] — [TEL]\n---\n\nESCALATION: 1) ENAC → 2) ADR → 3) Giudice di Pace"+extra;
  }

  // ── NEGATO IMBARCO / OVERBOOKING ──
  if(iss.includes("negat")||iss.includes("overbooking")||iss.includes("imbarco")||iss.includes("sbarcat")){
    return "BASE LEGALE: Reg. CE 261/2004 Art. 4\n\nDISTANZA ROTTA: "+label+"\nCOMPENSAZIONE: EUR "+comp+"/passeggero\n\nNEGATO IMBARCO NON VOLONTARIO (overbooking):\n✅ Hai diritto alla compensazione PIENA\n✅ Scelta tra: rimborso biglietto OPPURE volo alternativo\n✅ Assistenza immediata (pasti, hotel se necessario)\n\nNEGATO IMBARCO VOLONTARIO (rinuncia con accordo):\n- Se accetti compensazione dalla compagnia e rinunci al volo: i tuoi diritti EU 261 potrebbero essere limitati\n- Leggi attentamente prima di firmare qualsiasi rinuncia\n\nLIMITAZIONI PESO AL DECOLLO (es. Firenze per vento/caldo):\n⚠️ Se sei sbarcato per limitazioni MTOW/RTOW: hai gli stessi diritti del negato imbarco\n⚠️ Chiedi SEMPRE conferma scritta con la motivazione specifica\n⚠️ La compagnia deve emetterti il DBC (Denied Boarding Compensation)\n\nCOSA FARE SUBITO:\n1️⃣ NON firmare nulla senza leggere attentamente\n2️⃣ Chiedi conferma scritta del negato imbarco\n3️⃣ Scegli rimborso O volo alternativo\n4️⃣ Conserva tutti i documenti\n\nTESTO RECLAMO:\n---\nOgg: Reclamo negato imbarco - Reg CE 261/2004 - Art. 4\nSpett.le "+v+",\nil/la sottoscritto/a [NOME], prenotazione [PNR], si è presentato puntualmente all'imbarco del volo [N.] del "+d+", rotta "+rotta+".\nMi è stato negato l'imbarco [per overbooking / per limitazioni operative].\nAi sensi dell'Art. 4 Reg. CE 261/2004, richiedo compensazione EUR "+comp+" + [rimborso biglietto / volo alternativo].\n[NOME] — [EMAIL] — [TEL]\n---"+extra;
  }

  // ── BAGAGLIO ──
  if(iss.includes("bagagl")){
    return "BASE LEGALE: Convenzione di Montreal (1999) Art. 17-22\n\nBAGAGLIO SMARRITO O PERSO:\n- Compensazione max: circa EUR 1.300 (1.288 DSP — Diritti Speciali di Prelievo)\n- Se hai dichiarato il valore in anticipo (Dichiarazione di Valore Speciale): compensazione maggiore\n- Scadenza reclamo bagaglio PERSO: entro 21 giorni\n\nBAGAGLIO DANNEGGIATO:\n- Stessi massimali (EUR ~1.300)\n- Scadenza reclamo: entro 7 giorni\n\nBAGAGLIO IN RITARDO:\n- Diritto al rimborso spese necessità (vestiario, igiene)\n- Conserva TUTTI gli scontrini\n- Scadenza reclamo: entro 21 giorni\n\nPRIMA DI USCIRE DALL'AEROPORTO:\n1️⃣ Ufficio Lost & Found della compagnia → compilare modulo PIR (segnalazione)\n2️⃣ Conserva copia PIR + scontrino bagaglio\n3️⃣ Fotografa eventuali danni prima di toccare il bagaglio\n\nTESTO RECLAMO:\n---\nOgg: Reclamo bagaglio - Conv. Montreal 1999\nSpett.le "+v+",\nil/la sottoscritto/a [NOME], volo [N.] del "+d+", etichetta bagaglio [NUMERO].\nIl bagaglio è stato [smarrito / danneggiato / consegnato in ritardo].\n[Descrizione del danno/perdita]\nRichiedo rimborso spese/indennizzo ai sensi della Convenzione di Montreal 1999.\nAllego: copia PIR, scontrino bagaglio, [ricevute spese].\n[NOME] — [EMAIL] — [TEL]\n---"+extra;
  }

  // ── COINCIDENZA PERSA ──
  if(iss.includes("coincidenza")||iss.includes("connect")||iss.includes("prosecuzione")){
    return "BASE LEGALE: Reg. CE 261/2004 Art. 8 + CJUE C-11/11 (Air France v Folkerts)\n\nDISTANZA ROTTA TOTALE: "+label+"\nCOMPENSAZIONE: EUR "+comp+" (calcolata su distanza TOTALE origine→destinazione finale)\n\nQUANDO HAI DIRITTO A COMPENSAZIONE:\n✅ Unico PNR (biglietto unico): la compagnia DEVE riproteggerti\n✅ Ritardo all'arrivo a destinazione finale >= 3h → compensazione piena\n✅ Il calcolo della distanza usa la rotta ortodromica origine-destinazione finale\n\nQUANDO NON HAI DIRITTO:\n❌ Due biglietti separati: sei a rischio tuo\n❌ Circostanze straordinarie documentate\n\nCOSA FARE SUBITO:\n1️⃣ NON uscire dall'area internazionale\n2️⃣ Vai al banco della compagnia operante\n3️⃣ Chiedi riprotezione sul primo volo disponibile\n4️⃣ Se attesa >2h: chiedi pasti/bevande\n5️⃣ Se volo il giorno dopo: hotel + transfer garantiti\n\nESCALATION: 1) ENAC → 2) ADR → 3) Giudice di Pace"+extra;
  }

  // Default
  return "DISTANZA ROTTA: "+label+"\nCOMPENSAZIONE MAX EU 261: EUR "+comp+"\n\nScegli il tipo di problema per analisi completa:\n- Volo cancellato\n- Volo in ritardo\n- Negato imbarco / overbooking\n- Coincidenza persa\n- Bagaglio"+extra;
}

  [["cosa significa","codice","wchr","wchs","wchc","iata","sigla","termine"],"GLOSSARIO TERMINI AVIATION\n- WCHR: passeggero in sedia a rotelle che puo' fare le scale da solo\n- WCHS: sedia a rotelle, non puo' fare le scale\n- WCHC: assistenza totale, non deambula\n- BLND: passeggero non vedente\n- DEAF: passeggero non udente\n- DPNA: disabilita' cognitiva o non visibile\n- UM: minore non accompagnato\n- PRM: passeggero a mobilita' ridotta\n- MCT: tempo minimo di connessione tra voli\n- PIR: modulo segnalazione bagaglio smarrito/danneggiato\n- ESTA: autorizzazione elettronica ingresso USA (turismo)\n- ETA: autorizzazione elettronica ingresso UK/Canada/Australia\n- TWOV: transito senza visto in aeroporti selezionati"],

function chatAns(q){
  const ql=q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  // ── Normalizza slang e linguaggio colloquiale ──
  const normalize=(s)=>s
    .replace(/bimb[oa]/g,"bambino").replace(/figli[oa]/g,"figlio")
    .replace(/cucciolo|cagnolin[oa]|micin[oa]|gattino/g,"animale")
    .replace(/rott[oa]|spezzat[oa]|ingessatura/g,"gesso")
    .replace(/aspett[oa] un bambino|in dolce attesa|pancia|pancione/g,"gravidanza")
    .replace(/non cammino|non mi muovo|sulla sedia|carrozzella/g,"sedia rotelle")
    .replace(/carrozzina motorizzata|sedia motorizzata|carrozzina elettrica|sedia elettrica|sedia a motore/g,"sedia rotelle elettric")
    .replace(/carrozzina con batteria|sedia con batteria|sedia con le batterie/g,"sedia rotelle batteria")
    .replace(/non vedo|cieco|ipovedente/g,"non vedente")
    .replace(/non sento|sordo|non ode/g,"non udente")
    .replace(/aereo|volo|volare|voli|volando|partenza|partire/g,"volo")
    .replace(/soldi|euro|contanti|valuta/g,"contanti")
    .replace(/coincidenza|prosecuzione|secondo volo|altro volo/g,"coincidenza")
    .replace(/rotto|perso|non arrivato|mancante|sparito|scomparso/g,"perso")
    .replace(/sbarcat[oa]|non mi fanno salire|negat[oa]/g,"negato imbarco")
    .replace(/in ritardo|tardi|aspettare|aspetto ancora/g,"ritardo")
    .replace(/disdett[oa]|soppress[oa]|non part[ei]|non esiste/g,"cancellato")
    .replace(/ho la carrozzina|uso la carrozzina|viaggio in carrozzina|viaggio con la sedia/g,"sedia rotelle")
    .replace(/persona disabile|passeggero disabile|con disabilita/g,"disabil");
  const qn=normalize(ql);

  // ── Memoria di sessione ──
  // Accumula contesto tra messaggi: compagnia, scenario, preferenze
  if(!window._chatSession) window._chatSession={airline:null, topic:null, msgs:0};
  window._chatSession.msgs++;

  // ── Rileva compagnia ──
  const AIRLINE_MAP={
    "ryanair":"Ryanair","ryan":"Ryanair","rayan":"Ryanair",
    "easyjet":"easyJet","easy jet":"easyJet","easy":"easyJet","izy":"easyJet",
    "wizz":"Wizz Air","wizzair":"Wizz Air","wiz":"Wizz Air",
    "ita":"ITA Airways","alitalia":"ITA Airways","ita airways":"ITA Airways",
    "vueling":"Vueling","vuelin":"Vueling",
    "lufthansa":"Lufthansa Group","luft":"Lufthansa Group",
    "swiss":"Lufthansa Group","austrian":"Lufthansa Group",
    "air dolomiti":"Lufthansa Group","dolomiti":"Lufthansa Group",
    "brussels":"Lufthansa Group","klm":"KLM",
    "air france":"Air France","airfrance":"Air France","france":"Air France",
    "british":"British Airways","ba ":"British Airways",
    "iberia":"Iberia","tap":"TAP Air Portugal",
    "turkish":"Turkish Airlines","turchia":"Turkish Airlines",
    "transavia":"Transavia","volotea":"Volotea",
    "norwegian":"Norwegian","aegean":"Aegean Airlines",
    "sas":"SAS","finnair":"Finnair",
  };

  // Rileva compagnia nel messaggio corrente
  let airline=null;
  for(const[k,v]of Object.entries(AIRLINE_MAP)){if(qn.includes(k)){airline=v;break;}}

  // Se trovata nel messaggio corrente → aggiorna sessione
  if(airline) window._chatSession.airline=airline;
  // Se non trovata nel messaggio corrente → usa quella di sessione (se disponibile)
  else if(window._chatSession.airline) airline=window._chatSession.airline;

  // Comandi reset sessione
  if(qn.includes("nuova conversazione")||qn.includes("ricomincia")||qn.includes("reset")||qn.includes("dimentica")){
    window._chatSession={airline:null,topic:null,msgs:0};
    return "✅ Ho azzerato il contesto della conversazione. Possiamo ricominciare da capo!\n\n💬 Dimmi pure cosa ti serve.";
  }

  const withAirline=(data,label)=>{
    if(!airline)return null;
    const e=data[airline];
    if(!e)return "Non ho informazioni specifiche per "+airline+" su questo argomento.\nProva nella sezione 🎯 Speciali o 🧳 Bagagli.";
    const prefix = window._chatSession.airline && !qn.includes(airline.toLowerCase())
      ? "📋 "+airline+" (ricordo dal messaggio precedente) — "+label+":\n\n"
      : "📋 "+airline+" — "+label+":\n\n";
    return prefix+e;
  };

  // ── Pattern matching ──
  // REGOLA: le combinazioni PIÙ SPECIFICHE vengono sempre prima di quelle generiche.
  const has=(...words)=>words.some(w=>qn.includes(w));
  const hasAll=(...words)=>words.every(w=>qn.includes(w));

  // ══════════════════════════════════════════════════════════════
  // PRIORITÀ 0 — COMBINAZIONI SPECIFICHE (devono venire per prime)
  // ══════════════════════════════════════════════════════════════

  // POC / CONCENTRATORE DI OSSIGENO (prima del saluto)
  if(/\bpoc\b|concentrator.*ossigen|ossigen.*portati|ossigen.*concentrat|macchina.*ossigeno|ossigeno.*macchina/.test(q)){return POC_TEXT;}

  // CPAP / APNEA DEL SONNO (prima del saluto)
  if(/\bcpap\b|\bapap\b|\bbipap\b|apnea.*sonno|macchina.*respirat|maschera.*notte|macchina.*respir/.test(q)){return CPAP_TEXT;}

  // MEDIF (prima del saluto)
  if(/\bmedif\b|modulo.*medico|certificato.*medico.*volo|modulo.*sanitario|nullaosta.*sanitario|nulla.*osta.*medic|idoneita.*volo|devo.*medico.*aereo|serve.*medico.*aereo|quando.*serve.*medif|modulo.*volare/.test(q)){return MEDIF_TEXT;}

  // SEDIA A ROTELLE + BATTERIA/ELETTRICA (prima di tutti gli altri check)
  if(
    has("sedia","rotelle","carrozzin","wheelchair","wcmp","wclb","wclx","wcbd","carrozzina elettrica","sedia elettrica","sedia motorizzata","sedia motorizz","motorizzat") &&
    has("batter","elettric","motore","litio","wh","rimuov","removib","fissa","carica","autonomia")
  ){
    // Se ha specificato la compagnia → risposta specifica da SPECIAL_ASSIST
    const a=withAirline(SPECIAL_ASSIST,"sedia a rotelle elettrica");
    if(a) return a;
    // Altrimenti → risposta completa sulle batterie sedie a rotelle (da DGR)
    return DGR["sedia_rotelle_batteria"];
  }

  // SEDIA A ROTELLE + DIMENSIONI/TRASPORTO (prima dei check generici)
  if(
    has("sedia","rotelle","carrozzin","wheelchair") &&
    has("dimensioni","misure","larghezza","altezza","peso","passa","portellone","entra","stiva","trasport","quanto pesa","puo entrare")
  ){
    const a=withAirline(SPECIAL_ASSIST,"sedia a rotelle");
    if(a) return a;
    return "♿ DIMENSIONI E TRASPORTO DELLA SEDIA A ROTELLE\n\nLa tua sedia va sempre in stiva gratuitamente — ma le dimensioni contano per certi aerei.\n\nREGOLE GENERALI:\n- Nessun limite di peso universale, ma comunicare sempre peso e dimensioni alla compagnia\n- Portellone aeromobile: varia per tipo di aereo — sugli aerei piccoli (ATR, Embraer) può essere più stretto (min ~71cm)\n- Sedia elettrica: comunica anche tipo di batteria e Wh prima del volo\n- Fino a 2 ausili per la mobilità trasportati GRATIS su qualsiasi compagnia europea\n- Puoi tenere la tua sedia fino al gate — la riconsegni sottobordo e la ritrovi all'arrivo\n\n💡 Dimmi la tua compagnia per le misure esatte del portellone e le procedure specifiche!";
  }

  // OSSIGENO + SEDIA / DISABILITÀ (caso medico+mobilità insieme)
  if(has("ossigeno","poc","concentrator") && has("sedia","rotelle","carrozzin","disabil","mobilita")){
    return "🏥 OSSIGENO + MOBILITÀ RIDOTTA — caso che richiede pianificazione anticipata\n\nSe hai bisogno sia di assistenza per la mobilità sia di ossigeno terapeutico:\n1. Contatta la compagnia ALMENO 10 giorni prima (non 48h — serve più tempo)\n2. Richiedi sia il codice di assistenza (WCHR/WCHS/WCHC) sia l'ossigeno (OXYG)\n3. Porta il modulo MEDIF firmato dal tuo medico\n4. Chiedi conferma scritta di entrambe le richieste\n\n→ Per il tuo POC o concentratore specifico: vai a 🎯 Speciali > Casi medici\n💡 Dimmi la compagnia per il contatto diretto del team assistenza speciale";
  }

  // SALUTO / AIUTO
  if(has("ciao","salve","buon","aiuto","help","cosa sai","cosa puoi","come funzioni","come si usa") ||
     (has("dove","come faccio","non so","non capisco") && !has("poc","cpap","medif","sedia","rotelle","bagagl","volo","visto","diritti","compensaz"))){
    return "👋 Ciao! Sono l'assistente GateReady.\n\nPuoi scrivermi come preferisci — capisco il linguaggio di tutti i giorni!\n\nEsempi di cose che puoi chiedermi:\n💬 'Ho il volo cancellato'\n💬 'Porto il mio cane'\n💬 'Mia figlia vola sola, ha 8 anni'\n💬 'Sono incinta'\n💬 'Ho rotto un piede'\n💬 'Quanto bagaglio posso portare?'\n💬 'Ho bisogno della sedia a rotelle'\n💬 'Il mio bagaglio non è arrivato'\n\n💡 Se mi dici anche la compagnia ti rispondo in modo ancora più preciso!";
  }

  // BAGAGLIO PERSO / DANNEGGIATO / NON ARRIVATO
  if(has("bagaglio perso","bagaglio non","non arriva","non e arrivat","non e' arrivat","valigia persa","valigia non","smarrit","danneggiat","rott") && has("valigia","bagagli","borsa","zaino","trolley")){
    return "🧳 IL TUO BAGAGLIO NON È ARRIVATO?\n\nFAI SUBITO QUESTE COSE (prima di uscire dall'aeroporto):\n1️⃣ Vai all'ufficio Lost & Found della compagnia — è nell'area arrivi\n2️⃣ Compila il modulo PIR (segnalazione bagaglio) — FONDAMENTALE\n3️⃣ Tieni una copia del PIR e dello scontrino bagaglio\n\nSCADENZE:\n- Bagaglio danneggiato → reclamo entro 7 giorni\n- Bagaglio in ritardo o perso → reclamo entro 21 giorni\n\nRIMBORSO spese necessità (vestiario, necessità base):\n- Conserva tutti gli scontrini\n- Puoi richiedere rimborso fino a ~€1.300\n\n→ Per il testo del reclamo ufficiale vai a ⚖️ Diritti";
  }

  // BAGAGLIO GENERICO
  if(has("bagagl","valigia","trolley","zaino","stiva","borsa","peso","kg","kilo","misur","dimensi","oversize","eccedenz","quanto porto","cosa porto")){
    const a=withAirline(BAGGAGE,"politica bagagli");
    if(a)return a;
    return "🧳 BAGAGLI — dimmi la tua compagnia per le regole esatte!\n\nREGOLE GENERALI:\n- Bagaglio a mano: circa 55x40x23cm, 8-10kg\n- Bagaglio in stiva: 20-23kg per voli europei\n- Prenotare la stiva online è sempre più economico che in aeroporto\n- Power bank: solo in cabina (mai in stiva), max 160Wh\n\n→ Confronta tutte le compagnie nella sezione 🧳 Bagagli";
  }

  // LIQUIDI (solo se non c'è già "sedia" o "batteria sedia" nel contesto)
  if(has("liquid","shampoo","profum","gel","dentifricio","acqua","bottigli","bevand","crema","lozione","ml ") && !has("sedia","rotelle","carrozzin")){
    return "💧 LIQUIDI IN CABINA:\n- Max 100ml per contenitore\n- Tutto in un sacchetto trasparente zip da 1 litro\n- 1 sacchetto a persona — va tolto dallo zaino al controllo\n\nEsentati dal limite:\n✅ Medicine con ricetta medica\n✅ Latte e cibo per neonati\n✅ Acquistati dopo il controllo sicurezza\n\n❌ Acqua e bevande comprate prima vanno gettate al controllo.";
  }

  // VISTO / DOCUMENTI / PASSAPORTO
  if(has("visto","esta","passapor","documento","carta identita","ingresso","entrar","andare in","viaggio a ","volo per ")){
    return "🛂 VISTI E DOCUMENTI\nUsa la sezione ✈️ Viaggio per un'analisi completa con vaccini e checklist!\n\nRISPOSTA RAPIDA (passaporto italiano):\n- Paesi UE e Schengen: basta la carta d'identità valida\n- UK: passaporto + ETA (~£10, online)\n- USA turismo: ESTA obbligatoria (esta.cbp.dhs.gov, USD 21)\n  ⚠️ Per lavoro serve il visto B-1 — l'ESTA NON è valida!\n- Canada: eTA obbligatoria (canada.ca/eta, ~€7)\n- Australia: ETA online\n\n💡 Il passaporto deve essere valido almeno 3-6 mesi oltre la data di rientro.";
  }

// ---------- utils ----------
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function escAttr(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/"/g, "&quot;")
    .replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ---------- form persistence helpers ----------
function saveFormValues() {
  var ids = ["pfi", "pfv", "pti", "ptv", "psi", "psv", "pp", "pu", "pd",
             "ri", "rfi", "rfv", "rti", "rtv", "ra", "rd", "rp", "cin"];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) state.form[ids[i]] = el.value;
  }
}
function restoreFormValues() {
  for (var id in state.form) {
    var el = document.getElementById(id);
    if (el && state.form[id] != null) el.value = state.form[id];
  }
}
function fv(id) { return state.form[id] || ""; }

// ---------- airport autocomplete (rendered, delegated) ----------
function mkApt(id, ph) {
  return '<div class="apt-wrap">'
    + '<input class="apt-in" id="' + id + 'i" data-apt="' + id + '" placeholder="' + escAttr(ph) + '" autocomplete="off">'
    + '<input type="hidden" id="' + id + 'v">'
    + '<div class="apt-drop" id="' + id + 'd"></div>'
    + '</div>';
}
function aptSearch(id) {
  var inp = document.getElementById(id + "i");
  var drop = document.getElementById(id + "d");
  if (!inp || !drop) return;
  var q = inp.value.toLowerCase().trim();
  if (q.length < 1) { drop.style.display = "none"; return; }
  var res = [];
  for (var i = 0; i < AIRPORTS.length && res.length < 8; i++) {
    var a = AIRPORTS[i];
    if (a.c.toLowerCase().indexOf(q) > -1 || a.n.toLowerCase().indexOf(q) > -1 || a.co.toLowerCase().indexOf(q) > -1) {
      res.push(a);
    }
  }
  if (!res.length) { drop.style.display = "none"; return; }
  var out = "";
  for (var j = 0; j < res.length; j++) {
    var ap = res[j];
    out += '<div class="apt-item" data-aptpick="' + id + '" data-code="' + escAttr(ap.c) + '" data-name="' + escAttr(ap.n) + '">'
      + '<span class="apt-code">' + esc(ap.c) + '</span>' + esc(ap.n)
      + ' <span style="color:#9AA5B4;font-size:11px">(' + esc(ap.co) + ')</span></div>';
  }
  drop.innerHTML = out;
  drop.style.display = "block";
}
function aptPick(id, code, name) {
  var inp = document.getElementById(id + "i");
  var hid = document.getElementById(id + "v");
  var drop = document.getElementById(id + "d");
  if (inp) inp.value = code + " \u2014 " + name;
  if (hid) hid.value = code;
  if (drop) drop.style.display = "none";
  saveFormValues();
}
function aptVal(id) {
  var hid = document.getElementById(id + "v");
  return hid ? hid.value : "";
}

    + '<input class="chat-in" id="cin" placeholder="Scrivi qui... es. porto il mio cane">'
    + '<button class="chat-btn" data-action="send">&#10148;</button>'
    + '</div></div>';
}

// ---------- main render ----------
function render() {
  var c = document.getElementById("content");
  if (!c) return;
  var h = "";
  if (state.tab === "prep") h = rPrep();
  else if (state.tab === "rights") h = rRights();
  else if (state.tab === "bags") h = rBags();
  else if (state.tab === "special") h = rSpecial();
  else if (state.tab === "sos") h = rSOS();
  else if (state.tab === "chat") h = rChat();
  c.innerHTML = h;
  restoreFormValues();
  // tab highlight
  var btns = document.querySelectorAll(".tab-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i].getAttribute("data-tab") === state.tab);
  }
  // chat scroll + focus
  if (state.tab === "chat") {
    var m = document.getElementById("cmsgs");
    if (m) m.scrollTop = m.scrollHeight;
  }
}

// ---------- actions ----------
function doPrep() {
  saveFormValues();
  var f = aptVal("pf"), t = aptVal("pt"), s = aptVal("ps");
  if (!f || !t) { alert("Seleziona aeroporto di partenza e arrivo dalla lista"); return; }
  var pp = document.getElementById("pp"), pu = document.getElementById("pu"), pd = document.getElementById("pd");
  state.prepResult = getPrep(f, t, pp ? pp.value : "italiana", pu ? pu.value : "turismo", pd ? pd.value : "", s);
  render();
}
function doRights() {
  saveFormValues();
  var f = aptVal("rf"), t = aptVal("rt");
  if (!f || !t) { alert("Seleziona aeroporto di partenza e arrivo dalla lista"); return; }
  var ri = document.getElementById("ri"), ra = document.getElementById("ra"),
      rd = document.getElementById("rd"), rp = document.getElementById("rp");
  state.rigResult = getRights(ri ? ri.value : "cancellato", f, t, ra ? ra.value : "", rd ? rd.value : "", rp ? rp.value : "");
  render();
}
function sendChat(forcedMsg) {
  var inp = document.getElementById("cin");
  var q = forcedMsg || (inp ? inp.value.trim() : "");
  if (!q) return;
  if(!forcedMsg && inp) { state.form["cin"] = ""; inp.value = ""; }
  state.chat.push({ r: "u", t: q });
  var ans;
  try { ans = chatAns(q); } catch (e) { ans = "Mi dispiace, c'\u00E8 stato un problema. Riprova con altre parole."; }
  state.chat.push({ r: "a", t: ans });
  render();
  var i2 = document.getElementById("cin");
  if (i2) i2.focus();
}

// ---------- event delegation (single listeners, no inline JS) ----------
document.addEventListener("click", function (ev) {
  var el = ev.target;
  // climb up to find an actionable element
  while (el && el !== document.body) {
    var act = el.getAttribute && el.getAttribute("data-action");
    var tab = el.getAttribute && el.getAttribute("data-tab");
    if (tab) { saveFormValues(); state.tab = tab; render(); return; }
    if (act) {
      var key = el.getAttribute("data-key");
      if (act === "doprep") { doPrep(); return; }
      if (act === "dorights") { doRights(); return; }
      if (act === "selbag") { state.bagSel = key; saveFormValues(); render(); return; }
      if (act === "setsub") { state.spSub = key; saveFormValues(); render(); return; }
      if (act === "selwch") { state.spSelW = key; saveFormValues(); render(); return; }
      if (act === "selani") { state.spSelA = key; saveFormValues(); render(); return; }
      if (act === "selum") { state.spSelU = key; saveFormValues(); render(); return; }
      if (act === "sos") { var i = parseInt(key, 10); state.sosOpen = (state.sosOpen === i ? -1 : i); render(); return; }
      if (act === "send") {
        var forcedMsg = el.getAttribute("data-msg");
        if(forcedMsg){ sendChat(forcedMsg); } else { sendChat(); }
        return;
      }
    }
    // airport dropdown pick
    var pick = el.getAttribute && el.getAttribute("data-aptpick");
    if (pick) {
      aptPick(pick, el.getAttribute("data-code"), el.getAttribute("data-name"));
      return;
    }
    el = el.parentNode;
  }
  // click outside: close all airport dropdowns
  var drops = document.querySelectorAll(".apt-drop");
  for (var d = 0; d < drops.length; d++) drops[d].style.display = "none";
});

document.addEventListener("input", function (ev) {
  var el = ev.target;
  if (el && el.getAttribute) {
    var apt = el.getAttribute("data-apt");
    if (apt) { aptSearch(apt); }
    if (el.id) { state.form[el.id] = el.value; }
  }
});

document.addEventListener("change", function (ev) {
  var el = ev.target;
  if (el && el.id) { state.form[el.id] = el.value; }
});

document.addEventListener("keydown", function (ev) {
  if (ev.key === "Enter" && ev.target && ev.target.id === "cin") {
    sendChat();
  }
});

// ---------- boot ----------
render();

// ── Dark mode ──
function toggleDark(){
  var app = document.getElementById('app') || document.body;
  var isDark = app.classList.toggle('dark-mode');
  var btn = document.getElementById('darkToggle');
  if(btn) btn.textContent = isDark ? '☀️' : '🌙';
  try{ localStorage.setItem('gr-dark', isDark ? '1' : '0'); }catch(e){}
}
// Auto-applica dark mode al caricamento (preferenza sistema o salvata)
(function(){
  var saved = null;
  try{ saved = localStorage.getItem('gr-dark'); }catch(e){}
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved === '1' || (saved === null && prefersDark)){
    var app = document.getElementById('app') || document.body;
    app.classList.add('dark-mode');
    var btn = document.getElementById('darkToggle');
    if(btn) btn.textContent = '☀️';
  }
})();
